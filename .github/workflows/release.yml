name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force publish | Out-Null
          Copy-Item target/release/osu-network-accel.exe publish/OsuNetworkAccel.exe
      - uses: actions/upload-artifact@v4
        with:
          name: osu-network-accel-win-x64
          path: publish/OsuNetworkAccel.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: publish/OsuNetworkAccel.exe
